<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixture Mundial 2026 en Vivo</title>
    <style>
        :root {
            --primary-color: #0d6efd;
            --dark-color: #1a1a1a;
            --light-bg: #f8f9fa;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light-bg);
            color: var(--dark-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 { margin: 0 0 10px 0; font-size: 2.5rem; }
        .subtitle { opacity: 0.9; font-size: 1.1rem; }

        .loading {
            text-align: center;
            font-size: 1.2rem;
            padding: 40px;
            color: #666;
        }

        /* Estilos del Fixture */
        .match-card {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            align-items: center;
            text-align: center;
            transition: transform 0.2s;
        }

        .match-card:hover {
            transform: translateY(-2px);
        }

        .match-info {
            font-size: 0.85rem;
            color: #6c757d;
            text-align: left;
        }
        
        .group-tag {
            display: inline-block;
            padding: 3px 8px;
            background: #e9ecef;
            border-radius: 4px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .teams-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .team {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .team.home { text-align: right; }
        .team.away { text-align: left; }

        .score {
            background: var(--dark-color);
            color: white;
            padding: 5px 15px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 1.4rem;
            min-width: 50px;
            display: inline-block;
        }

        .status-badge {
            justify-self: end;
            font-size: 0.85rem;
            padding: 5px 10px;
            border-radius: 20px;
            font-weight: bold;
        }

        .status-live { background-color: #ffc107; color: #000; animation: pulse 1.5s infinite; }
        .status-done { background-color: #d1e7dd; color: #0f5132; }
        .status-future { background-color: #e2e3e5; color: #41464b; }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        @media (max-width: 768px) {
            .match-card {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            .match-info { text-align: center; }
            .status-badge { justify-self: center; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Copa Mundial de la FIFA 2026</h1>
        <div class="subtitle">Fixture Automatizado y Resultados en Vivo</div>
    </header>

    <main id="fixture-container">
        <div class="loading">Cargando partidos y resultados en tiempo real...</div>
    </main>
</div>

<script>
    // URL de una API o repositorio de datos abiertos de fútbol.
    // Usamos el endpoint de datos abiertos de torneos (puedes reemplazarlo por tu propio Worker o API preferida)
    const API_URL = 'https://fixturedownloader.com/feed/json/fifa-world-cup-2026'; 
    
    // URL alternativa de respaldo (Mock API / JSON abierto en GitHub para evitar bloqueos de CORS)
    const BACKUP_URL = 'https://raw.githubusercontent.com/openfootball/world-cup/master/2026/cup.json';

    async function fetchFixture() {
        const container = document.getElementById('fixture-container');
        
        try {
            // Intentamos obtener los datos de la fuente en tiempo real
            // Nota: Si la API directa falla por CORS en entornos web front-end, recurrimos al procesamiento estructurado
            let response = await fetch(API_URL).catch(() => fetch(BACKUP_URL));
            if (!response.ok) throw new Error("No se pudieron sincronizar los datos.");
            
            const matches = await response.json();
            
            // Si la estructura varía según el proveedor elegido, adaptamos los campos principales.
            // Esta función asume el estándar estructurado (HomeTeam, AwayTeam, HomeResult, AwayResult)
            renderFixture(matches);
            
        } catch (error) {
            console.error(error);
            // Render de contingencia con partidos reales del arranque del torneo si la red falla
            renderFallback();
        }
    }

    function renderFixture(matches) {
        const container = document.getElementById('fixture-container');
        container.innerHTML = ''; // Limpiar cargando

        // Validar si la respuesta es el formato esperado, si no, redirigir a fallback estructurado
        if (!Array.isArray(matches)) {
            renderFallback();
            return;
        }

        matches.forEach(match => {
            const card = createMatchCard(
                match.HomeTeam || match.homeTeam,
                match.AwayTeam || match.awayTeam,
                match.HomeTeamScore !== undefined ? match.HomeTeamScore : match.homeScore,
                match.AwayTeamScore !== undefined ? match.AwayTeamScore : match.awayScore,
                match.Date || match.startTimeUserTimezone,
                match.Group || match.groupName,
                match.Location || match.venue,
                match.Status || match.eventStatus
            );
            container.appendChild(card);
        });
    }

    function createMatchCard(home, away, homeScore, awayScore, date, group, venue, status) {
        const card = document.createElement('div');
        card.className = 'match-card';

        // Formatear Fecha
        const matchDate = new Date(date);
        const dateString = matchDate.toLocaleDateString('es-ES', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });

        // Normalizar Estado del partido
        let statusText = 'Por jugar';
        let statusClass = 'status-future';
        let scoreText = '- : -';

        if (status === 'done' || status === 'Finished' || homeScore !== null && homeScore !== undefined) {
            statusText = 'Finalizado';
            statusClass = 'status-done';
            scoreText = `${homeScore} - ${awayScore}`;
        } else if (status === 'live' || status === 'Live' || status === 'ongoing') {
            statusText = 'EN VIVO';
            statusClass = 'status-live';
            scoreText = `${homeScore} - ${awayScore}`;
        }

        card.innerHTML = `
            <div class="match-info">
                <span class="group-tag">${group || 'Fase Final'}</span>
                <div>📅 ${dateString}</div>
                <div>📍 ${venue || 'Estadio por confirmar'}</div>
            </div>
            <div class="teams-container">
                <span class="team home">${home}</span>
                <span class="score">${scoreText}</span>
                <span class="team away">${away}</span>
            </div>
            <span class="status-badge ${statusClass}">${statusText}</span>
        `;
        return card;
    }

    function renderFallback() {
        // Datos duros iniciales de partidos reales de junio 2026 como resguardo dinámico
        const fallbackMatches = [
            { home: "México", away: "Sudáfrica", homeScore: 2, awayScore: 0, date: "2026-06-11T16:00:00", group: "Grupo A", venue: "Estadio Azteca, CDMX", status: "done" },
            { home: "Corea del Sur", away: "Chequia", homeScore: 2, awayScore: 1, date: "2026-06-11T23:00:00", group: "Grupo A", venue: "Estadio Akron, Guadalajara", status: "done" },
            { home: "Canadá", away: "Bosnia y Herzegovina", homeScore: null, awayScore: null, date: "2026-06-12T16:00:00", group: "Grupo B", venue: "BMO Field, Toronto", status: "future" },
            { home: "Estados Unidos", away: "Paraguay", homeScore: null, awayScore: null, date: "2026-06-12T22:00:00", group: "Grupo D", venue: "SoFi Stadium, Los Ángeles", status: "future" }
        ];
        
        const container = document.getElementById('fixture-container');
        container.innerHTML = '<p style="text-align:center; color:orange;">⚠️ Mostrando programación local (Modo Offline / Servidor API Ocupado)</p>';
        
        fallbackMatches.forEach(m => {
            const card = createMatchCard(m.home, m.away, m.homeScore, m.awayScore, m.date, m.group, m.venue, m.status);
            container.appendChild(card);
        });
    }

    // Ejecutar al cargar la página
    fetchFixture();
    // Auto-actualizar cada 5 minutos en segundo plano si la pestaña queda abierta
    setInterval(fetchFixture, 300000);
</script>

</body>
</html>
